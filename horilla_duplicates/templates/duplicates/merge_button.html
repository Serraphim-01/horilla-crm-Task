{% load i18n %}
<div id="merge-actions">
    <button
        type="button"
        id="merge-selected-btn"
        class="px-4 py-2 text-sm font-medium text-white bg-primary-600 rounded-md hover:bg-primary-700 transition-colors"
        hx-post="{{ merge_url }}"
        hx-include="[name='duplicate_ids']:checked, [name='object_id'], [name='content_type_id']"
        hx-target="#inner-tab-potential-duplicates-content"
        hx-swap="innerHTML"
        hx-confirm="{% trans 'Are you sure you want to merge the selected duplicate(s) into this record?' %}"
    >
        <span id="merge-btn-text">{{ button_text }}</span>
    </button>
</div>
